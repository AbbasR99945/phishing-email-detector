<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phishing Email Detector</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Phishing Email Detector</h1>
        <p>Check email text for suspicious wording, sender clues, and risky URLs.</p>
      </div>
      <div class="header-actions">
        <button id="sample" class="secondary">Load risky sample</button>
        <button id="clean-sample" class="secondary">Load clean sample</button>
      </div>
    </header>
    <section class="status-strip" aria-label="project status">
      <span>Fake training examples only</span>
      <span>No credential collection</span>
      <span>Evidence-based scoring</span>
    </section>
    <section class="grid">
      <div class="panel full">
        <label for="email-input">Email text</label>
        <textarea id="email-input" spellcheck="false" placeholder="Paste a fake or cleaned email example here."></textarea>
        <div class="actions">
          <button id="analyze">Analyze email</button>
          <button id="export" class="secondary">Export report</button>
          <button id="clear" class="secondary">Clear</button>
        </div>
        <p id="status" class="status-note" aria-live="polite">Ready for a fake training email.</p>
      </div>
      <div class="panel full">
        <h2>Risk summary</h2>
        <div id="score" class="metric-row"></div>
      </div>
      <div class="panel">
        <h2>Findings</h2>
        <div id="findings" class="list"></div>
      </div>
      <div class="panel">
        <h2>Links</h2>
        <div id="links" class="list"></div>
      </div>
      <div class="panel full">
        <h2>Triage notes</h2>
        <div id="guidance" class="guidance-grid"></div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
